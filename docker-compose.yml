services:
  postgres:
    image: postgres:15-alpine
    container_name: sisfin_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sisfin
      POSTGRES_PASSWORD: sisfin
      POSTGRES_DB: sisfin_db
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sisfin -d sisfin_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sisfin_network

volumes:
  postgres_data:
    driver: local

networks:
  sisfin_network:
    driver: bridge

